syntax = "proto3";

import "google/api/annotations.proto";

option go_package = "proto/bbproto";
option java_multiple_files = true;
option java_package = "io.github.bigbagger";
option java_outer_classname = "BbProtos";
option objc_class_prefix = "Bb";

import "protoc-gen-swagger/options/annotations.proto";

option (grpc.gateway.protoc_gen_swagger.options.openapiv2_swagger) = {
    info: {
        title: "BigBagger";
        version: "1.0";
        contact: {
            name: "BigBagger";
            url: "https://github.com/BigBagger/bigbagger";
            email: "alex@shvid.com";
        };
    };
    schemes: HTTP;
    schemes: HTTPS;
    consumes: "application/json";
    produces: "application/json";
};

package bb;

service DatasetService {

    rpc create (CreateDatasetRequest) returns (CreateDatasetResponse) {
        option (google.api.http) = {
            post: "/v1/dataset"
            body: "*"
        };
    }

    rpc update (UpdateDatasetRequest) returns (UpdateDatasetResponse) {
        option (google.api.http) = {
            put: "/v1/dataset/{name}"
            body: "*"
        };
    }

    rpc delete (DeleteDatasetRequest) returns (DeleteDatasetResponse) {
        option (google.api.http) = {
            delete: "/v1/dataset/{name}"
        };
    }

    rpc list (ListDatasetsRequest) returns (ListDatasetsResponse) {
        option (google.api.http) = {
            get: "/v1/dataset"
        };
    }

    rpc status (GetDatasetStatusRequest) returns (GetDatasetStatusResponse) {
        option (google.api.http) = {
            get: "/v1/dataset/{name}"
        };
    }

}

enum DataDistribution {
    REPLICATION = 0;
    PARTITION = 1;
}

message Partition {
    int32 total = 1;
    int32 replicationFactor = 2;
}

enum PointInTime {
    PIT_NO = 0;
    PIT_LAST_ONE = 1;
    PIT_LAST_FIVE = 5;
    PIT_LAST_TEN = 10;
    PIT_ALL = 100;
}

message Dataset {
    string       name         = 1;
    DataDistribution distr    = 2;
    Partition    partition    = 3;
    string       encryption   = 4;
    string       compression  = 5;
    PointInTime  pit          = 6;
}

message CreateDatasetRequest {
    string    token = 1;
    Dataset   dataset = 2;
}

message CreateDatasetResponse {
    string   name = 1;
}

message UpdateDatasetRequest {
    string   token = 1;
    string   name = 2;
    Dataset  dataset = 3;
}

message UpdateDatasetResponse {
    string   name = 1;
}

message DeleteDatasetRequest {
    string   token = 1;
    string   name  = 2;
}

message DeleteDatasetResponse {
    string   name = 1;
}

message ListDatasetsRequest {
    string   token = 1;
}

message ListDatasetsResponse {
    repeated string name = 1;
}

message GetDatasetStatusRequest {
    string  token = 1;
    string  name = 2;
}

message GetDatasetStatusResponse {
    Dataset  dataset = 1;
}

service RecordService {

    rpc execute (RecordRequest) returns (RecordResponse) {
        option (google.api.http) = {
            put: "/v1/record"
            body: "*"
        };
    }

}

message Key {

    string   setName       = 1;
    bytes    partitionKey  = 2;
    bytes    recordKey     = 3;
    fixed64  timestamp     = 4;   // requests before or equal to this timestamp if not 0

}

message Record {
    int64   version     = 1;
    bytes   value       = 2;
}

message RecordOpeation {

  Key key = 1;

  oneof operation {
    ExistsOperation exists = 10;
    GetOperation    get    = 11;
    TouchOperation  touch  = 12;
    PutOperation    put    = 13;
    RemoveOperation remove = 14;
  }

}

message ExistsOperation {
}

message GetOperation {
}

message TouchOperation {
}

message PutOperation {

    bool    compareAndSet = 1;
    int64   version       = 2;
    bytes   value         = 3;
    int32   ttlSeconds    = 4;

}

message RemoveOperation {
}

enum StatusCode {

     SUCCESS = 0;
     SUCCESS_NOT_UPDATED = 1;  // for compare and put operation that is non-locking algorithm

     ERROR_NO_DATASET = 10;    // not found: database, namespace, store, table, cache, catalog, etc.
     ERROR_BAD_REQUEST = 11;   // invalid parameters in request
     ERROR_POLICY = 12;        // exists record for operation that requires record and vise versa
     ERROR_MIGRATION = 13;     // data or connections migration occur during operation
     ERROR_NETWORK = 14;       // all connection errors and network availability
     ERROR_AUTH = 15;          // security configuration and authentication
     ERROR_FORBIDDEN = 16;     // authorization
     ERROR_TIMEOUT = 17;       // all SLA errors
     ERROR_OVERLOAD = 18;      // all errors related to high load of operations, full queues and etc.
     ERROR_OVERFLOW = 19;      // all errors related to data space
     ERROR_LOCKED = 20;        // all tries to update data that was in pessimistic lock
     ERROR_ABORTED = 21;       // client aborted stream operation
     ERROR_INTERRUPTED = 22;   // server aborted stream operation
     ERROR_UNSUPPORTED = 23;   // unsupported commands
     ERROR_DRIVER = 24;        // data access driver specific errors
     ERROR_IO = 25;            // file, serialization, network i/o errors
     ERROR_INTERNAL = 26;      // all unknown errors

}

message RecordResult {

  StatusCode    status = 1;
  string        errorMessage = 2;

  oneof result {
    ExistsResult    exists = 10;
    GetResult       get    = 11;
    TouchResult     touch  = 12;
    PutResult       put    = 13;
    RemoveResult    remove = 14;
  }

}

message ExistsResult {

   bool       exists    = 1;
   fixed64    timestamp = 2;
}

message GetResult {

   int64    version   = 1;
   bytes    value     = 2;
   fixed64  timestamp = 3;

}

message TouchResult {
}

message PutResult {
}

message RemoveResult {
}

message RecordRequest {

    string   token = 1;
    repeated RecordOpeation list = 2;

}

message RecordResponse {

    repeated RecordResult list = 1;

}



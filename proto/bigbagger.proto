syntax = "proto3";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "proto/bbproto";
option java_multiple_files = true;
option java_package = "io.github.bigbagger";
option java_outer_classname = "BBProtos";
option objc_class_prefix = "BB";

import "protoc-gen-swagger/options/annotations.proto";

option (grpc.gateway.protoc_gen_swagger.options.openapiv2_swagger) = {
    info: {
        title: "BigBagger";
        version: "1.0";
        contact: {
            name: "BigBagger";
            url: "https://github.com/BigBagger/bigbagger";
            email: "alex@shvid.com";
        };
    };
    schemes: HTTP;
    schemes: HTTPS;
    consumes: "application/json";
    produces: "application/json";
};

package bb;

service DatasetService {

    rpc Create (Dataset) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/v1/dataset"
            body: "*"
        };
    }

    rpc Update (Dataset) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            put: "/v1/dataset/{name}"
            body: "*"
        };
    }

    rpc Delete (String) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            delete: "/v1/dataset/{value}"
        };
    }

    rpc Get (String) returns (stream Dataset) {
        option (google.api.http) = {
            get: "/v1/dataset/{value}"
        };
    }

}

enum DataDistribution {
    DD_LOCAL = 0;
    DD_REPLICATION = 1;
    DD_PARTITION = 2;
}

message Partition {
    int32 total = 1;
    int32 replicationFactor = 2;
}

enum PointInTime {
    PIT_NO = 0;
    PIT_LAST_ONE = 1;
    PIT_LAST_FIVE = 5;
    PIT_LAST_TEN = 10;
    PIT_FIRST_TEN_LAST_TEN = 20;
    PIT_ALL = 100;
}

enum EncryptionAlgorithm {
    ALG_NO     = 0;
    ALG_AES256 = 1;
}

enum EncryptionMode {
    MODE_NO   = 0;
    MODE_ECB  = 1;
    MODE_CBC  = 2;
    MODE_OFB  = 3;
    MODE_CFB  = 4;
    MODE_CTR  = 5;
    MODE_XTS  = 6;
}

message Encryption {
    EncryptionAlgorithm  algorithm = 1;
    EncryptionMode       mode      = 2;
    string               topoKey   = 3;
    string               topoIv    = 4;
}

enum DataCompression {
    DC_NO      = 0;
    DC_FLATE   = 1;
    DC_GZIP    = 2;
    DC_LZW     = 3;
    DC_ZLIB    = 4;
    DC_BZIP2   = 5;
}

message Compression {
    DataCompression  comp       = 1;
    int32            threshold  = 2;    // threshold in bytes when compression will be enabled, 0 - no threshold
}

message Dataset {
    string           version      = 1;     // version of the data structure, 1.0 - the first one
    string           name         = 2;     // can not be changed
    DataDistribution distr        = 3;     // can not be changed
    Partition        partition    = 4;     // can not be changed
    Compression      compression  = 5;     // can not be changed
    Encryption       encryption   = 6;     // can not be changed
    PointInTime      pit          = 7;     // can not be changed
    int32            ttlSeconds   = 8;     // can be changed, for 0 = NO-TTL
}

message String {
    string  value  = 1;
}

service TransactionService {

    rpc Execute (Transaction) returns (TransactionContext) {
        option (google.api.http) = {
            put: "/v1/transaction"
            body: "*"
        };
    }

}

message Key {

    string   setName       = 1;
    bytes    partitionKey  = 2;
    bytes    recordKey     = 3;
    fixed64  timestamp     = 4;   // requests before or equal to this timestamp, if not 0

}

message RecordOperation {

  Key key = 1;

  oneof operation {
    HeadOperation   head   = 10;
    GetOperation    get    = 11;
    TouchOperation  touch  = 12;
    PutOperation    put    = 13;
    RemoveOperation remove = 14;
  }

}

message HeadOperation {
}

message GetOperation {
}

message TouchOperation {

    bool     overrideTtl   = 1;
    int32    ttlSeconds    = 2;   // overrides dataset TTL

}

message PutOperation {

    bytes    value         = 1;

    bool     overrideTtl   = 2;
    int32    ttlSeconds    = 3;   // overrides dataset TTL

    bool     compareAndSet = 4;
    fixed64  version       = 5;   // committedAt

}

message RemoveOperation {
}

enum StatusCode {

     SUCCESS = 0;
     SUCCESS_NOT_UPDATED = 1;  // for compare and put operation that is non-locking algorithm

     ERROR_NO_DATASET = 10;    // not found: database, namespace, store, table, cache, catalog, etc.
     ERROR_BAD_REQUEST = 11;   // invalid parameters in request
     ERROR_POLICY = 12;        // exists record for operation that requires record and vise versa
     ERROR_MIGRATION = 13;     // data or connections migration occur during operation
     ERROR_NETWORK = 14;       // all connection errors and network availability
     ERROR_AUTH = 15;          // security configuration and authentication
     ERROR_FORBIDDEN = 16;     // authorization
     ERROR_TIMEOUT = 17;       // all SLA errors
     ERROR_OVERLOAD = 18;      // all errors related to high load of operations, full queues and etc.
     ERROR_OVERFLOW = 19;      // all errors related to data space
     ERROR_LOCKED = 20;        // all tries to update data that was in pessimistic lock
     ERROR_ABORTED = 21;       // client aborted stream operation
     ERROR_INTERRUPTED = 22;   // server aborted stream operation
     ERROR_UNSUPPORTED = 23;   // unsupported commands
     ERROR_DRIVER = 24;        // data access driver specific errors
     ERROR_IO = 25;            // file, serialization, network i/o errors
     ERROR_INTERNAL = 26;      // all unknown errors

}

message RecordResult {

  StatusCode    status   = 1;
  string        message  = 2;   // for error it is error message, for success additional information about execution

  oneof result {
    HeadResult      head    = 10;
    GetResult       get     = 11;
    TouchResult     touch   = 12;
    PutResult       put     = 13;
    RemoveResult    remove  = 14;
  }

}

message HeadResult {

   fixed64    version    = 1;  // committedAt, if 0 then not exists
   fixed64    expiresAt  = 2;
   fixed64    timestamp  = 3;

}

message GetResult {

   bytes      value      = 1;

   fixed64    version    = 2;  // committedAt, if 0 then not exists
   fixed64    expiresAt  = 3;
   fixed64    timestamp  = 4;

}

message TouchResult {
}

message PutResult {
}

message RemoveResult {
}

message Transaction {

    repeated RecordOperation operations = 1;

}

message TransactionContext {

    repeated RecordResult results = 1;

}



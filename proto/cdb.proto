syntax = "proto3";

import "google/api/annotations.proto";

option go_package = "go.arpabet.com/consensusdb/pkg/pb;pb";
option java_multiple_files = true;
option java_package = "com.consensusdb";
option java_outer_classname = "CdbProtos";
option objc_class_prefix = "CDB";

import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "ConsensusDB";
        version: "1.0";
        contact: {
            name: "ConsensusDB";
            url: "https://github.com/arpabet/consensusdb";
            email: "alex@consensusdb.com";
        };
    };
    schemes: HTTP;
    schemes: HTTPS;
    consumes: "application/json";
    consumes: "application/octet-stream";
    produces: "application/json";
    produces: "application/octet-stream";
};

package cdb;


//
//  Key-value database service
//

service KeyValueService {

    //
    // Gets exact match entry
    //
    rpc Get(KeyRequest) returns (Record) {
        option (google.api.http) = {
            get: "/v1/get"
        };
    }

    //
    // Gets early or equal timestamp entry
    //
    rpc GetRecent(KeyRequest) returns (Record) {
        option (google.api.http) = {
            get: "/v1/getrecent"
        };
    }

    //
    // Gets range of timestamps inside a row
    //
    rpc GetRange(RangeRequest) returns (Block) {
        option (google.api.http) = {
            get: "/v1/getrange"
        };
    }

    //
    // Gets the whole raw of records with all available timestamps with latest versions
    //
    rpc GetRow(KeyRequest) returns (stream Block) {
        option (google.api.http) = {
            get: "/v1/getrow"
        };
    }

    //
    // Gets the whole region of records
    //
    rpc GetRegion(KeyRequest) returns (stream Block) {
        option (google.api.http) = {
            get: "/v1/getregion"
        };
    }

    //
    // Gets the whole space of records associated with majorKey
    //
    rpc GetSpace(KeyRequest) returns (stream Block) {
        option (google.api.http) = {
            get: "/v1/getspace"
        };
    }

    //
    // Gets all records
    //
    rpc Scan(ScanRequest) returns (stream Block) {
        option (google.api.http) = {
            get: "/v1/scan"
        };
    }

    //
    // Touches the record
    //
    rpc Touch(RecordRequest) returns (Status) {
        option (google.api.http) = {
            put:  "/v1/touch"
            body: "*"
        };
    }

    //
    // Puts the record
    //
    rpc Put(RecordRequest) returns (Status) {
        option (google.api.http) = {
            put:  "/v1/put"
            body: "*"
        };
    }

    //
    // Remove the record
    //
    rpc Remove(KeyRequest) returns (Status) {
        option (google.api.http) = {
            delete: "/v1/remove"
        };
    }

    //
    // Atomically increments a counter, returns the previous value
    //
    rpc Increment(IncrementRequest) returns (IncrementResponse) {
        option (google.api.http) = {
            post: "/v1/increment"
            body: "*"
        };
    }

    //
    // Writes multiple records in one atomic (all-or-nothing) operation
    //
    rpc Batch(BatchRequest) returns (Status) {
        option (google.api.http) = {
            post: "/v1/batch"
            body: "*"
        };
    }

    //
    // Streams change events for keys under a prefix, served from this node's
    // local watch hub (fed by the raft apply path — cross-node, best-effort)
    //
    rpc Watch(WatchRequest) returns (stream WatchEvent) {
        option (google.api.http) = {
            get: "/v1/watch"
        };
    }

}

// Java compatible
message TimeUUID {
    int64  mostSigBits   = 1;
    int64  leastSigBits  = 2;
}

message Key {

    bytes     majorKey      = 1;   // used as a partition key, good candidate is accountId, if empty - data replicated in all partitions
    bytes     regionName    = 2;
    bytes     minorKey      = 3;   // used as a record key in the partition
    TimeUUID  timestamp     = 4;   // timestamp in TimeUUID if present

}

message KeyRequest {

    Key        key            = 1;
    bool       headOnly       = 2;

    int32      timeout        = 4;    // SLA of the operation if not 0

}

message RecordRequest {

    Key      key     = 1;
    bytes    value   = 2;

    int32    metadata       = 3;   // for user 8 bits only, 9 bit deletedBit
    int64    ttlSeconds     = 4;   // client input: relative TTL in seconds, 0 means no TTL

    bool     compareAndSet  = 6;
    uint64   version        = 7;   // if 0 then putIfAbsent

    int32    timeout        = 8;   // SLA of the operation if not 0

    // Absolute expiry (unix seconds) computed once on the leader from ttlSeconds
    // before the write enters the raft log, so every replica stores the same
    // expiry. Clients leave it 0 and set ttlSeconds; the server fills it in.
    int64    expiresAt      = 9;

}


message IncrementRequest {

    Key      key            = 1;
    int64    initial        = 2;   // counter start value when the key is absent
    int64    delta          = 3;   // amount to add (may be negative)
    int64    ttlSeconds     = 4;   // client input: relative TTL in seconds, 0 means no TTL

    int32    timeout        = 5;   // SLA of the operation if not 0

    // Absolute expiry (unix seconds) computed once on the leader; see RecordRequest.
    int64    expiresAt      = 6;

}

message IncrementResponse {

    int64    previous       = 1;   // counter value before delta was applied
    int64    current        = 2;   // counter value after delta was applied
    uint64   version        = 3;   // envelope version (raft log index on the replicated path)

}

message BatchRequest {

    repeated RecordRequest records = 1;   // written all-or-nothing in one engine txn

    int32    timeout               = 2;   // SLA of the operation if not 0

}

enum ChangeType {
    WATCH_SET    = 0;   // key created or updated
    WATCH_DELETE = 1;   // key removed (or reclaimed after expiry)
}

// Internal raft command (no RPC): the leader discovers expired entries by a
// wall-clock scan and proposes their reclamation; the FSM deletes each key only
// if its stored envelope version still matches, so the removal is deterministic
// across replicas (never re-evaluating wall-clock expiry at apply time).
message ReclaimEntry {
    bytes  entryKey = 1;   // encoded storage key observed as expired
    uint64 version  = 2;   // envelope version the leader saw; delete only if unchanged
}

message ReclaimRequest {
    repeated ReclaimEntry entries = 1;
}

message WatchRequest {

    Key    prefix  = 1;   // watch keys under this prefix; empty prefix watches everything
    int32  timeout = 2;   // SLA of the operation if not 0

}

message WatchEvent {

    Key        key     = 1;
    bytes      value   = 2;   // empty for WATCH_DELETE
    uint64     version = 3;   // envelope version (raft log index) of the change
    ChangeType type    = 4;

}

enum RangeType {
    LESS_OR_EQUAL = 0;
}

message RangeRequest {

    Key        key         = 1;
    bool       headOnly    = 2;

    RangeType  type        = 4;
    int32      numRecords  = 5;

    int32      timeout     = 6;   // SLA of the operation
}

message ScanRequest {

    bool       headOnly    = 1;

}

message EnumerateRequest {

    Key    prefix  = 1;   // region/prefix to scan; empty scans everything
    bool   ordered = 2;   // server sorts results by the decoded minor key (lexical)
    bool   reverse = 3;   // with ordered, stream in descending order
    int32  timeout = 4;   // SLA of the operation if not 0

}

message Status {

    bool       updated     = 1;

}

message Head {

   uint64     version    = 1;
   uint64     expiresAt  = 2;
   int64      diskSize   = 3;
   int32      metadata   = 4;   // for user 8 bits only, 9 bit deletedBit

}

message Record {

   Key     key     = 1;
   Head    head    = 2;     // if exists, then record was found
   bytes   value   = 3;

}


message Block {

  repeated  Record  record = 1;

}

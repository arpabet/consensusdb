[etcd]
etcdEndpoint=localhost:2379

[server]
httpAddress=:4481
grpcAddress=:4482

[database]
dataDir=/tmp/bigbagger

[compression]
# supported compressors:  NO, FLATE, GZIP, LZW, ZLIB, BZIP2
compressor=FLATE
# supported levels: 0, 1, 6, 9 (whereas 6 is default)
level=6
# compress payloads that more than 100 bytes
threshold=100

[encryption]
# supported ciphers: NO, AES
cipher=AES
# supported modes:  NO, GCM, CFB
mode=CFB
# supported key size in bits:  0, 128, 192, 256
keySize=256
# key will be retrieved from security context
topo=password


[security]
password=De6*u1tPassw0rd!



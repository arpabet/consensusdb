[network]
# list of peers
peer.1=http://localhost:4481
peer.2=http://localhost:5481
peer.3=http://localhost:6481
# raft node ID
peerId = 2
# raft cluster ID
clusterId = 1
# optional peerName
peerName=second

[server]
# serve UI, REST, metrics, static, raft
httpAddress=localhost:5481
# serve gRPC client requests
grpcAddress=localhost:5482

[database]

# create dirs is not exist
createIfNotExist=true

dataDir=/tmp/cdb2

#keyDir=/tmp/cdb2/key
#valueDir=/tmp/cdb2/value
#walDir=/tmp/cdb2/WAL
#snapDir=/tmp/cdb2/snap

[compression]
# supported compressors:  NO, FLATE, GZIP, LZW, ZLIB, BZIP2, LZ4
compressor=LZ4
# supported levels: 0, 1, 6, 9 (whereas 6 is default)
level=6

[encryption]
# supported ciphers: NO, AES
cipher=AES
# supported modes:  NO, GCM, CFB
mode=CFB
# supported key size in bits:  0, 128, 192, 256
keySize=256
# key will be retrieved from key store
keyStore=local


[security]
password=De6*u1tPassw0rd!


